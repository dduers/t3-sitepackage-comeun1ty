<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:layout name="Default" />

<f:section name="Main">
    <f:form action="login" target="_top" fieldNamePrefix="">
        <fieldset>
            <h5>
                {user.first_name} {user.last_name}
            </h5>
            <div class="mb-3">

                {user.username} &lt;{user.email}&gt;
            </div>

            <div>
                <f:form.submit class="btn btn-lg btn-danger" id="tx-felogin-input-logout" name="submit"
                    value="{f:translate(domain: 'felogin.messages', key: 'logout')}" />
            </div>

            <div class="felogin-hidden">
                <f:form.hidden name="logintype" value="logout" />
                <f:if condition="{noRedirect}!=''">
                    <f:form.hidden name="noredirect" value="1" />
                </f:if>
            </div>
        </fieldset>
    </f:form>
</f:section>

</html>
