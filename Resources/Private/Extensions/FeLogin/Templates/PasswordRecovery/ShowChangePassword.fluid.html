<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<h2>Account recovery</h2>
<h4>Reset your password</h4>

<div class="container shadow border p-3 mb-5">

    <f:if condition="{passwordRequirements}">
        <div class="alert alert-warning">
            <p>
                <f:translate domain="felogin.messages" key="password_requirement" />
            </p>
            <ul class="m-0">
                <f:for each="{passwordRequirements}" as="passwordRequirement">
                    <li>{passwordRequirement}</li>
                </f:for>
            </ul>
        </div>
    </f:if>

    <f:render partial="ValidationErrors" />

    <f:form action="changePassword" method="post" spellcheck="false">
        <fieldset class="mb-3">

            <div class="form-floating mb-3">
                <f:form.password name="newPass" id="tx-felogin-input-newpassword-1" class="form-control"
                    required="required" autocomplete="new-password"
                    placeholder="{f:translate(domain: felogin.messages, key: 'newpassword_label1')}" />
                <label for="tx-felogin-input-newpassword-1">
                    <f:translate domain="felogin.messages" key="newpassword_label1" />
                </label>
            </div>

            <div class="form-floating mb-3">
                <f:form.password name="newPassRepeat" id="tx-felogin-input-newpassword-2" class="form-control"
                    required="required" autocomplete="new-password"
                    placeholder="{f:translate(domain: felogin.messages, key: 'newpassword_label1')}" />
                <label for="tx-felogin-input-newpassword-2">
                    <f:translate domain="felogin.messages" key="newpassword_label2" />
                </label>
            </div>


            <f:form.hidden name="hash" value="{hash}" />
            <div>
                <f:form.submit class="btn btn-lg btn-primary"
                    value="{f:translate(domain: 'felogin.messages', key: 'change_password')}" />
            </div>
        </fieldset>
    </f:form>

    <p>
        <f:link.action action="login" controller="Login">
            <f:translate domain="felogin.messages" key="forgot_header_backToLogin" />
        </f:link.action>
    </p>

</div>

</html>
