<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">


<div class="form-floating mb-3 {fieldName}">

    <f:form.countrySelect property="{fieldName}" id="sfrCountry" optionLabelField="localizedName"
        sortByOptionLabel="true" prependOptionLabel="{f:translate(id: 'please_select')}" prependOptionValue=""
        value="{f:if(condition: '{user.{fieldName}}', then: '{user.{fieldName}}', else: options.defaultValue)}"
        onlyCountries="{options.allowedCountries}" class="form-control {options.cssClass}" />

    <label for="sfrCountry" class="ps-4">
        <f:translate id="{fieldName}" />
        <f:render partial="Required" arguments="{field: fieldName}" />
    </label>

    <f:render partial="FieldError" arguments="{for: 'user', field: fieldName}" />

</div>

</html>
