<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<div class="formerrors">
	<f:form.validationResults for="{for}">
		<f:if condition="{validationResults.flattenedErrors}">
			<div class="container shadow border ps-3 pe-3 pt-3 mb-3">
				<f:for each="{validationResults.flattenedErrors}" key="propertyPath" as="propertyErrors">
					<f:for each="{propertyErrors}" as="propertyError">
						<div class="alert alert-danger error errorMessage errorField field{field}">
							<f:format.printf arguments="{field: '{f:translate(id: \'{propertyPath}\')}'}">
								{propertyError.message}
							</f:format.printf>
						</div>
					</f:for>
				</f:for>
			</div>
		</f:if>
	</f:form.validationResults>
</div>

</html>
